<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Regal Office & Home — Premium Furniture Store</title>
    <meta name="description" content="Premium office and home furniture from Regal Office & Home. Executive desks, ergonomic chairs, workstations, conference tables and more. Harare & Bulawayo, Zimbabwe." />
    <meta name="author" content="Regal Office & Home" />

    <meta property="og:title" content="Regal Office & Home — Premium Furniture" />
    <meta property="og:description" content="A legacy of comfort. Shop executive desks, office chairs, workstations and home furniture." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/favicon.svg" />
    <script>
      (() => {
        const storageKey = "regal-office-home-theme";
        const root = document.documentElement;

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
        } catch (_error) {
          root.classList.add("dark");
          root.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
